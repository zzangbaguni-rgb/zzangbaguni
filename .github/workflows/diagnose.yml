name: 품목 진단 (KAMIS)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: 품목별 소매/도매 건수 점검
        env:
          KAMIS_KEY: ${{ secrets.KAMIS_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.parse, urllib.request, datetime
          KEY=os.environ["KAMIS_KEY"]
          URL="https://apis.data.go.kr/B552845/perDay/price"
          t=datetime.date.today(); d=datetime.timedelta
          GTE=(t-d(days=10)).strftime("%Y%m%d"); LTE=(t-d(days=1)).strftime("%Y%m%d")
          DATA="111:쌀:100,112:찹쌀:100,113:혼합곡:100,114:기장:100,121:보리쌀:100,141:콩:100,142:팥:100,143:녹두:100,144:메밀:100,151:고구마:100,152:감자:100,161:귀리:100,162:보리:100,163:수수:100,164:율무:100,211:배추:200,212:양배추:200,213:시금치:200,214:상추:200,215:얼갈이배추:200,216:갓:200,217:연근:200,218:우엉:200,221:수박:200,222:참외:200,223:오이:200,224:호박:200,225:토마토:200,226:딸기:200,231:무:200,232:당근:200,233:열무:200,241:건고추:200,242:풋고추:200,243:붉은고추:200,244:피마늘:200,245:양파:200,246:파:200,247:생강:200,248:고춧가루:200,251:가지:200,252:미나리:200,253:깻잎:200,254:부추:200,255:피망:200,256:파프리카:200,257:멜론:200,258:깐마늘(국산):200,259:깐마늘(수입):200,261:브로콜리:200,262:양상추:200,263:청경채:200,264:케일:200,265:콩나물:200,266:절임배추:200,279:알배기배추:200,280:브로콜리:200,422:방울토마토:200,411:사과:400,412:배:400,413:복숭아:400,414:포도:400,415:감귤:400,416:단감:400,418:바나나:400,419:참다래:400,420:파인애플:400,421:오렌지:400,423:자몽:400,424:레몬:400,425:체리:400,426:건포도:400,427:건블루베리:400,428:망고:400,429:블루베리:400,430:아보카도:400,4301:소:500,4304:돼지:500,4401:수입 소고기:500,4402:수입 돼지고기:500,512:쇠고기:500,514:돼지고기:500,515:닭고기:500,516:계란:500,520:오리고기:500,535:우유:500,9901:닭:500,9903:계란:500,9908:우유:500,611:고등어:600,612:꽁치:600,613:갈치:600,614:조기:600,615:명태:600,616:삼치:600,619:물오징어:600,638:마른멸치:600,639:북어:600,640:마른오징어:600,641:김:600,642:마른미역:600,643:염장미역:600,644:굴:600,647:넙치:600,648:우럭:600,649:수입조기:600,650:새우젓:600,651:멸치액젓:600,652:천일염:600,653:전복:600,654:새우:600,656:꽃게:600,658:홍합:600,659:가리비:600,660:건다시마:600,661:바지락:600,662:고등어필렛:600,663:전어:600"
          ITEMS=[x.split(":") for x in DATA.split(",")]
          def cnt(item,ctgry,se):
              q={"serviceKey":KEY,"returnType":"JSON","numOfRows":"1","pageNo":"1",
                 "cond[se_cd::EQ]":se,"cond[ctgry_cd::EQ]":ctgry,"cond[item_cd::EQ]":item,
                 "cond[exmn_ymd::GTE]":GTE,"cond[exmn_ymd::LTE]":LTE}
              try:
                  with urllib.request.urlopen(URL+"?"+urllib.parse.urlencode(q),timeout=20) as r:
                      return int(json.load(r).get("response",{}).get("body",{}).get("totalCount",0) or 0)
              except Exception as e:
                  return "ERR:"+str(e)[:30]
          print("조사기간", GTE, "~", LTE, "(소매=se_cd 01)")
          print()
          zero=[]
          for code,name,ctgry in ITEMS:
              r=cnt(code,ctgry,"01")
              w=cnt(code,ctgry,"02") if r==0 else ""
              print(f"{code:>6} {name:<13} 소매={r} 도매={w}")
              if r==0: zero.append((name,code,w))
          print("\n===== 소매 0건 요약 =====")
          for name,code,w in zero:
              tag="도매엔 있음(소매 미조사)" if isinstance(w,int) and w>0 else "도매도 0(미조사/제철아님)"
              print("  "+name+"("+code+"): "+tag)
          print("\n총", len(ITEMS), "개 중 소매 0건", len(zero), "개")
          PYEOF
