name: 매일 시세 수집 (KAMIS)

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 아침 6시(KST)
  workflow_dispatch:        # 버튼으로 수동 실행도 가능

permissions:
  contents: write           # data 파일 커밋용

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: 시세 수집 실행
        env:
          KAMIS_KEY: ${{ secrets.KAMIS_KEY }}   # 저장소 Secrets에 넣은 키
        run: python3 scripts/collect.py
      - name: 갱신된 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js
          git commit -m "chore: 시세 자동 갱신 $(date +%F)" || echo "변동 없음"
          git push
