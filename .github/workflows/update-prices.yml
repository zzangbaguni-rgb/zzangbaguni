name: 매일 시세 수집 (KAMIS)

on:
  schedule:
    - cron: '0 12 * * *'   # 매일 밤 9시(KST) = 12시(UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: 시세 수집 실행
        env:
          KAMIS_KEY: ${{ secrets.KAMIS_KEY }}
        run: python3 scripts/collect.py
      - name: 데이터 커밋 (rebase 없이 원격에 덮어쓰기, 재시도)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data.json /tmp/data.json
          cp data.js  /tmp/data.js
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/data.json data.json
            cp /tmp/data.js  data.js
            git add data.json data.js
            if git diff --cached --quiet; then echo "변동 없음"; exit 0; fi
            git commit -m "chore: 시세 자동 갱신 $(date +%F)"
            if git push origin HEAD:main; then echo "push 성공"; exit 0; fi
            echo "원격이 바뀜, 재시도 $i..."; sleep $((RANDOM % 5 + 3))
          done
          echo "push 실패"; exit 1
