name: 매일 시세 수집 (KAMIS)

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 아침 6시(KST) = 21시(UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: 시세 수집 실행
        env:
          KAMIS_KEY: ${{ secrets.KAMIS_KEY }}
        run: python3 scripts/collect.py
      - name: 갱신된 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js
          git commit -m "chore: 시세 자동 갱신 $(date +%F)" || { echo "변동 없음"; exit 0; }
          git pull --rebase --autostash origin main || true
          git push
